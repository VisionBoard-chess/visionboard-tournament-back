syntax = "proto3";

package chesslive;

service GameService {
  rpc CreateGame(CreateGameRequest) returns (CreateGameResponse);
  rpc StreamGameImages(stream ImageFrame) returns (stream ImageProcessingResponse);

  // -- Los siguientes vendrán después, desde el backend, no del móvil --
  rpc StopGame(StopGameRequest) returns (StopGameResponse);
  rpc EditGame(stream EditGameMessage) returns (stream EditGameResponse);
  rpc AddMoves(stream AddMovesMessage) returns (stream AddMovesResponse);
  rpc GameOver(stream GameOverMessage) returns (stream GameOverResponse);
}

// CreateGame
message GameConfig {
  string name        = 1; // game_id (viene del móvil)
  string orientation = 2; // hardcodeado en móvil: "Top right"
  string strategy    = 3; // hardcodeado en móvil: "color"
}

message CameraConfig {
  repeated float corners = 1; // [x1,y1, x2,y2, x3,y3, x4,y4]
}

message StreamConfig {
  bool   is_tournament   = 1; // true = torneo (ahora siempre true)
  string tournament_name = 2;
  string round_name      = 3;
}

message CreateGameRequest {
  GameConfig   game_config   = 1;
  CameraConfig camera_config = 2;
  StreamConfig stream_config = 3;
}

message CreateGameResponse {
  bool            success = 1;
  string          message = 2;
  optional string game_id = 3;
}

// StreamGameImages
message ImageFrame {
  string game_id    = 1; // ✅ renombrado de game_name a game_id, más consistente
  bytes  image_data = 2;
  int64  timestamp  = 3;
}

message ImageProcessingResponse {
  bool   success = 1;
  string message = 2;
}


// Mensajes para StopGame
message StopGameRequest {
  string game_name = 1;
}

message StopGameResponse {
  bool success = 1;
  string message = 2;
}

// Mensajes para EditGame
message EditGameMessage {
  oneof message_type {
    EditGameRequest request = 1;
    EditMoveRequest edit_move = 2;
  }
}

message EditGameRequest {
  string game_name = 1;
}

message EditMoveRequest {
  int32 move_number = 1;
  string new_move = 2;
}

message EditGameResponse {
  oneof response_type {
    MovesListResponse moves_list = 1;
    EditMoveResponse edit_result = 2;
  }
}

message MovesListResponse {
  repeated string moves = 1;
}

message EditMoveResponse {
  bool success = 1;
  string message = 2;
}

// Mensajes para AddMoves
message AddMovesMessage {
  oneof message_type {
    AddMovesRequest request = 1;
    NewMove new_move = 2;
    DoneSignal done = 3;
  }
}

message AddMovesRequest {
  string game_name = 1;
}

message NewMove {
  string move = 1;
}

message DoneSignal {
  bool done = 1;
}

message AddMovesResponse {
  oneof response_type {
    MovesListResponse current_moves = 1;
    MoveValidationResponse validation = 2;
  }
}

message MoveValidationResponse {
  bool success = 1;
  string message = 2;
}

// Mensajes para GameOver
message GameOverMessage {
  oneof message_type {
    GameOverRegistration registration = 1;
    GameOverConfirmation confirmation = 2;
  }
}

message GameOverRegistration {
  string game_name = 1;
}

message GameOverConfirmation {
  optional bool confirmed = 1;
  string game_name = 2;
}

message GameOverResponse {
  oneof response_type {
    GameOverNotification notification = 1;
    GameOverResult result = 2;
    EditGameResponse edit_response = 3;
  }
}

message GameOverNotification {
  string game_name = 1;
  string result = 2;
  string reason = 3;
}

message GameOverResult {
  optional bool game_stopped = 1;
  string message = 2;
}
